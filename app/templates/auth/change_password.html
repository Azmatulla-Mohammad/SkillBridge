{% extends "base.html" %}
{% block content %}
  <section class="section">
    <div class="container">
      <div class="card stack" style="max-width: 520px; margin: 0 auto;">
        <div class="section-heading left compact">
          <p class="eyebrow">Security</p>
          <h2>Change your password</h2>
        </div>

        <p class="muted">
          For security, you must change your temporary password before accessing your dashboard.
        </p>

        <form action="/change-password" method="post" class="stack">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <label>
            <span>Current Password</span>
            <input type="password" name="current_password" required placeholder="Enter current password">
          </label>

          <label>
            <span>New Password</span>
            <input type="password" name="new_password" required minlength="8" placeholder="Enter a new password">
          </label>

          <label>
            <span>Confirm Password</span>
            <input type="password" name="confirm_password" required minlength="8" placeholder="Confirm the new password">
          </label>

          <div class="button-row">
            <button type="submit" class="button button-primary">Save Password</button>
            <a class="button button-secondary" href="/logout">Logout</a>
          </div>
        </form>
      </div>
    </div>
  </section>
{% endblock %}
